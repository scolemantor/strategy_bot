# Oak strategy configuration
# Edit the branches holdings to match your actual conviction picks.

portfolio:
  total_target_value_usd: 200000

allocation:
  # 50% trunk - tilted toward US equities for this experiment
  trunk:
    weight: 0.50
    holdings:
      VTI: 0.70
      VXUS: 0.10
      BND: 0.10
      GLD: 0.10

  # 35% branches - thematic conviction holdings
  branches:
    weight: 0.35
    holdings:
      SMH: 0.143
      XLU: 0.143
      ITA: 0.143
      IHI: 0.143
      PAVE: 0.143
      INDA: 0.143
      COPX: 0.142

  # 15% acorns - held as cash in Phase 1, managed manually
  acorns:
    weight: 0.15

rebalance:
  drift_threshold: 0.05
  min_order_size_usd: 100

risk:
  max_order_pct_of_portfolio: 0.05
  max_daily_orders: 20
  drawdown_kill_switch_pct: 0.05
  require_market_hours: true