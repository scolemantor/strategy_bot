# Oak strategy configuration
# Phase 3 version: vol weighting + regime detection enabled

portfolio:
  total_target_value_usd: 200000

allocation:
  trunk:
    weight: 0.50
    weighting_method: equal
    holdings:
      VTI: 0.70
      VXUS: 0.10
      BND: 0.10
      GLD: 0.10

  branches:
    weight: 0.35
    weighting_method: inverse_volatility
    holdings:
      SMH: 1.0
      XLU: 1.0
      ITA: 1.0
      IHI: 1.0
      PAVE: 1.0
      INDA: 1.0
      COPX: 1.0

  acorns:
    weight: 0.15

regime:
  enabled: true
  benchmark: SPY
  ma_window: 200
  offsignal_cash_pct: 0.40

rebalance:
  drift_threshold: 0.05
  min_order_size_usd: 100

risk:
  max_order_pct_of_portfolio: 0.05
  max_daily_orders: 20
  drawdown_kill_switch_pct: 0.05
  require_market_hours: true
