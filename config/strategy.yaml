# Oak strategy configuration
# Phase 3 version: vol weighting + regime detection (defensive tagging + whipsaw protection)
portfolio:
  total_target_value_usd: 200000
allocation:
  trunk:
    weight: 0.50
    weighting_method: equal
    holdings:
      VTI:  { weight: 0.70, risk_class: equity }
      VXUS: { weight: 0.10, risk_class: equity }
      BND:  { weight: 0.10, risk_class: defensive }
      GLD:  { weight: 0.10, risk_class: defensive }
  branches:
    weight: 0.35
    weighting_method: inverse_volatility
    holdings:
      SMH: 1.0
      XLU: 1.0
      ITA: 1.0
      IHI: 1.0
      PAVE: 1.0
      INDA: 1.0
      COPX: 1.0
  acorns:
    weight: 0.15
regime:
  enabled: true
  benchmark: SPY
  ma_window: 200
  offsignal_cash_pct: 0.40
  # Whipsaw protection (added Phase 3): SPY must be more than buffer_pct past
  # the MA for min_consecutive_days consecutive days to flip the regime.
  # These defaults are conservative; tune via Phase 4e backtest sweep.
  buffer_pct: 0.02
  min_consecutive_days: 3
rebalance:
  drift_threshold: 0.05
  min_order_size_usd: 100
risk:
  max_order_pct_of_portfolio: 0.05
  max_daily_orders: 20
  drawdown_kill_switch_pct: 0.05
  require_market_hours: true