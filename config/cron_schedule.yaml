timezone: America/New_York

jobs:
  - name: scan_all
    schedule: "0 23 * * 0-4"  # 11:00 PM Sun-Thu nights; output ready for next morning
    command: "python scan.py all"
    timeout_minutes: 180   # was 90; cold-cache cycles need ~70m for insider_buying alone
    description: "Run all 13 scanners weekday evenings; output ready for next morning"

  - name: meta_ranker
    schedule: "30 2 * * 1-5"  # 2:30 AM Mon-Fri (3.5h after scan_all start)
    command: "python -m scanners.meta_ranker --date $(date -d 'yesterday' +%F)"
    timeout_minutes: 5
    description: "Aggregate previous-night scan output into master_ranked.csv"

  - name: watchlist_digest
    schedule: "35 2 * * 1-5"  # 2:35 AM Mon-Fri (5 min after meta_ranker)
    command: "python scan.py watch digest --date $(date -d 'yesterday' +%F)"
    timeout_minutes: 5
    description: "Generate watchlist deltas and fire daily_summary_email; reads previous-night scan"

  - name: rebalance
    schedule: "0 18 * * 0"  # 6 PM Sunday
    command: "python scan.py rebalance"
    timeout_minutes: 30
    description: "Weekly portfolio rebalance (paper account for now)"

  - name: log_rotation
    schedule: "0 3 * * *"  # 3 AM daily
    command: "python -m src.logging_v2.query maintain"
    timeout_minutes: 5
    description: "Daily log gzip + retention pass"

dead_man_switch:
  enabled: true
  ping_interval_minutes: 60
  alert_after_silent_minutes: 90
  endpoint: http://localhost:8000/api/health
