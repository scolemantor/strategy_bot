timezone: America/New_York

jobs:
  - name: morning_pipeline
    schedule: "0 6 * * 1-5"  # 6 AM ET Mon-Fri (~3.5h before market open)
    timeout_minutes: 180
    description: "Mon-Fri morning pipeline: scan_all -> meta_ranker -> watchlist_digest, chained via && (next step only runs if previous succeeded)"
    steps:
      - name: scan_all
        command: "python scan.py all"
      - name: meta_ranker
        command: "python -m scanners.meta_ranker --date $(date +%F)"
      - name: watchlist_digest
        command: "python scan.py watch digest --date $(date +%F)"

  - name: sunday_preview_pipeline
    schedule: "0 19 * * 0"  # 7 PM ET Sunday — Monday-open preview
    timeout_minutes: 180
    description: "Sunday evening pipeline: scan_all -> meta_ranker -> watchlist_digest, chained via && (preview for Monday open)"
    steps:
      - name: scan_all
        command: "python scan.py all"
      - name: meta_ranker
        command: "python -m scanners.meta_ranker --date $(date +%F)"
      - name: watchlist_digest
        command: "python scan.py watch digest --date $(date +%F)"

  - name: rebalance
    schedule: "0 18 * * 0"  # 6 PM Sunday (1h before sunday_preview_pipeline)
    command: "python scan.py rebalance"
    timeout_minutes: 30
    description: "Weekly portfolio rebalance (paper account for now)"

  - name: log_rotation
    schedule: "0 3 * * *"  # 3 AM daily
    command: "python -m src.logging_v2.query maintain"
    timeout_minutes: 5
    description: "Daily log gzip + retention pass"

  - name: technical_overlay
    schedule: "*/15 9-16 * * 1-5"  # every 15 min, 9 AM-4 PM ET, Mon-Fri (covers pre-market through close)
    command: "python scan.py run technical_overlay"
    timeout_minutes: 5
    description: "Phase 8a: refresh technical setup-quality scores for top 10 master_ranked tickers (intraday only — not part of scan_all)"

dead_man_switch:
  enabled: true
  ping_interval_minutes: 60
  alert_after_silent_minutes: 90
  endpoint: http://localhost:8000/api/health
