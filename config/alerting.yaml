pushover:
  user_key: env:PUSHOVER_USER_KEY
  app_token: env:PUSHOVER_APP_TOKEN
  test_mode: false
  skip_for_event_types:
    - daily_summary_email   # email-only event; Pushover suppresses

severity_routing:
  CRITICAL:
    priority: 2
    sound: siren
    retry_seconds: 60      # priority 2 only
    expire_seconds: 1800   # priority 2 only
    rate_limit_per_hour: 10
    bypasses_quiet_hours: true
  OPERATIONAL:
    priority: 0
    sound: pushover
    rate_limit_per_hour: 20
    bypasses_quiet_hours: false
  INFO:
    priority: -1
    sound: none
    rate_limit_per_hour: 5
    bypasses_quiet_hours: false

quiet_hours:
  enabled: true
  start: "22:00"
  end: "06:00"
  timezone: America/New_York

dedup_window_minutes: 15

email:
  provider: resend
  resend_api_key: env:RESEND_API_KEY    # required; raises if env unset
  resend_from:                          # null -> EmailChannel reads RESEND_FROM env / sandbox default
  resend_to:                            # null -> EmailChannel reads RESEND_TO env / SMTP_TO env / default
  test_mode: false
  send_for_severities:
    - OPERATIONAL
  send_only_for_event_types:
    - daily_summary_email
  attach_master_ranked: true
