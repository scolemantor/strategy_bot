pushover:
  user_key: env:PUSHOVER_USER_KEY
  app_token: env:PUSHOVER_APP_TOKEN
  test_mode: false
  skip_for_event_types:
    - daily_summary_email   # email-only event; Pushover suppresses

severity_routing:
  CRITICAL:
    priority: 2
    sound: siren
    retry_seconds: 60      # priority 2 only
    expire_seconds: 1800   # priority 2 only
    rate_limit_per_hour: 10
    bypasses_quiet_hours: true
  OPERATIONAL:
    priority: 0
    sound: pushover
    rate_limit_per_hour: 20
    bypasses_quiet_hours: false
  INFO:
    priority: -1
    sound: none
    rate_limit_per_hour: 5
    bypasses_quiet_hours: false

quiet_hours:
  enabled: true
  start: "22:00"
  end: "06:00"
  timezone: America/New_York

dedup_window_minutes: 15

email:
  smtp_host: smtp.gmail.com
  smtp_port: 587
  smtp_user: env:SMTP_USER
  smtp_password: env:SMTP_PASSWORD
  smtp_to:               # null/empty -> EmailChannel falls back to env:SMTP_TO, then to smtp_user
  test_mode: false
  send_for_severities:
    - OPERATIONAL
  send_only_for_event_types:
    - daily_summary_email
  attach_master_ranked: true
