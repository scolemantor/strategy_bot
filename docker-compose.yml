version: "3.9"

services:
  strategy_bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: strategy_bot:latest
    container_name: strategy_bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://strategy_bot:${POSTGRES_PASSWORD}@postgres:5432/strategy_bot
    # Note: command intentionally not set. The Dockerfile ENTRYPOINT runs
    # entrypoint.sh which orchestrates cron + alembic + uvicorn together.
    ports:
      - "8000:8000"
    volumes:
      # Bind mounts so data_cache and logs survive container rebuilds.
      - ./data_cache:/app/data_cache
      - ./logs:/app/logs
      - ./scan_output:/app/scan_output
      - ./backtest_output:/app/backtest_output
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 60s
      timeout: 10s
      start_period: 60s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: strategy_bot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: strategy_bot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: strategy_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strategy_bot -d strategy_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
